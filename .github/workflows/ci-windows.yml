name: CI (Windows Build + Tests)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build lines-test (Debug x64)
        run: msbuild lines-test\lines-test.vcxproj /m /p:Configuration=debug /p:Platform=x64

      - name: Build triangles-test (Debug x64)
        run: msbuild triangles-test\triangles-test.vcxproj /m /p:Configuration=debug /p:Platform=x64

      - name: Run lines-test
        shell: pwsh
        run: |
          $exe = "bin/lines-test-debug-x64-msc-v145.exe"
          if (!(Test-Path $exe)) { throw "Missing test executable: $exe" }
          & $exe --reporter compact

      - name: Run triangles-test
        shell: pwsh
        run: |
          $exe = "bin/triangles-test-debug-x64-msc-v145.exe"
          if (!(Test-Path $exe)) { throw "Missing test executable: $exe" }
          & $exe --reporter compact

      - name: Build main (Release x64)
        run: msbuild main\main.vcxproj /m /p:Configuration=release /p:Platform=x64

      - name: Run main asset self-test
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bin -Filter 'main-*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw 'Main executable not found in bin/' }
          & $exe.FullName --selftest_assets

      - name: Build main (Debug x64)
        run: msbuild main\main.vcxproj /m /p:Configuration=debug /p:Platform=x64
