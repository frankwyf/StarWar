name: CI (Windows Full Validation)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Run full validation script (Debug)
        shell: pwsh
        run: tools/run-full-validation.ps1 -Configuration debug -Platform x64 -SkipSmoke

      - name: Extra smoke matrix (release binary)
        run: msbuild main\main.vcxproj /m /p:Configuration=release /p:Platform=x64

      - name: Run smoke matrix scenarios (best effort)
        continue-on-error: true
        timeout-minutes: 4
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bin -Filter 'main-release-x64-*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $exe) { throw 'Release executable not found in bin/' }
          & $exe.FullName --selftest_assets
          & $exe.FullName --smoketest=0.6 --geometry=1280x720 --fbshift=0 --seed=42
          & $exe.FullName --smoketest=0.6 --geometry=960x540 --fbshift=1 --seed=42
          if (!(Test-Path artifacts\smoketest-last-frame.ppm)) { throw 'Smoke matrix frame artifact missing' }

      - name: Upload smoke frame artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-frame-preview
          path: artifacts/smoketest-last-frame.ppm
          if-no-files-found: ignore
