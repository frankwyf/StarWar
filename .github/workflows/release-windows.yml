name: Build and Release (Windows)

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build StarWar release
        run: msbuild StarWar.sln /m /p:Configuration=release /p:Platform=x64

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item bin/main-release-x64-msc-v145.exe dist/StarWar.exe
          if (Test-Path README.md) { Copy-Item README.md dist/README.md }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/LICENSE }

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarWar-windows-x64
          path: dist

      - name: Create zip package
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath StarWar-windows-x64.zip -Force

      - name: Publish tagged release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: StarWar-windows-x64.zip
