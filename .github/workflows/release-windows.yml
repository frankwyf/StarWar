name: Build and Release (Windows)

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLAYABLE_ARTIFACT_NAME: StarWar-Windows-Playable
  PLAYABLE_ZIP_NAME: StarWar-${{ github.ref_name }}-Windows-Playable.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build StarWar release
        run: msbuild main\\main.vcxproj /m /p:Configuration=release /p:Platform=x64

      - name: Prepare package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $gameExe = Get-ChildItem -Path bin -Filter 'main-*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $gameExe) { throw 'StarWar executable was not produced in bin/' }
          Copy-Item $gameExe.FullName dist/StarWar.exe
          if (Test-Path assets) { Copy-Item -Recurse -Force assets dist/assets }
          if (Test-Path README.md) { Copy-Item README.md dist/README.md }
          if (Test-Path LICENSE) { Copy-Item LICENSE dist/LICENSE }

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLAYABLE_ARTIFACT_NAME }}
          path: dist

      - name: Create zip package
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath $env:PLAYABLE_ZIP_NAME -Force

      - name: Publish tagged release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: StarWar ${{ github.ref_name }}
          body: |
            修复 EXE 无法打开的问题（补齐运行所需资源文件打包）。

            Players: download `${{ env.PLAYABLE_ZIP_NAME }}`, extract it, and run `StarWar.exe`.

            The auto-generated source code archives are for developers. Most players should ignore them.
          files: ${{ env.PLAYABLE_ZIP_NAME }}
          generate_release_notes: true
